# HOW TO USE:
#   1. Place your data files in your DATA folder
#   2. Rename them to match the filenames below
#   3. Run
#
# OPTIONAL FILES:
#   If you don't have a file yet, just comment out its entry
#   by putting a # in front of the lines, like this:
#
#   # - name: formations
#   #   path: ...
#
#   The pipeline will skip it cleanly.
#
# FILE NAMING CONVENTION (rename your files to match):
#   dem.tif            ? DEM / elevation raster
#   orthophoto.tif     ? satellite / aerial image
#   formations.geojson ? geological formation polygons
#   faults.geojson     ? fault lines
#   road.kml           ? road / boundary polygon
#   samples.csv        ? geochemical / borehole samples



name: rwth_geology_project
description: "Hindu Kush study area Ś Cu geochemistry and DEM analysis"

# -- DATA DIRECTORY (change only this if you move your folder) --
# All paths below use this as their base.
# F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA


# ------------------------------------------------------------
# VECTOR SOURCES
# Comment out any block you don't have yet
# ------------------------------------------------------------
vector_sources: []

#  - name: road
#    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/road.kml
#    layer: null
#    field_map:
#      Name: area_name
#    filter_expr: null

# Uncomment when you have this file:
#  - name: formations
#    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/formations.geojson
#    layer: null
#    field_map:
#      FORM_NAME: formation
#    filter_expr: null

#  - name: faults
#    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/faults.geojson
#    layer: null
#    field_map:
#      FAULT_TYPE: fault_type
#    filter_expr: null


# ------------------------------------------------------------
# RASTER SOURCES
# Comment out any block you don't have yet
# ------------------------------------------------------------
raster_sources:

  - name: dem
    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/dem.tif
    band: 1
    nodata: null

# Uncomment when you have this file:
  - name: orthophoto
    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/orthophoto.tif
    band: 1
    nodata: null


# ------------------------------------------------------------
# TABULAR SOURCES
# Comment out if you don't have sample/borehole data yet
# ------------------------------------------------------------
tabular_sources:

  - name: samples
    path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/samples.csv
    lon_col: longitude
    lat_col: latitude
    crs_epsg: 4326
    field_map:
      SAMPLE_ID: sample_id
      Cu_pct: cu_pct
      depth_m: depth_m


# ------------------------------------------------------------
# CRS Ś reproject everything to this
# 4326  = WGS84 (degrees, global)
# 32642 = UTM Zone 42N (metres, your study area)
# ------------------------------------------------------------
crs:
  project_epsg: 4326


# ------------------------------------------------------------
# GEOMETRY
# ------------------------------------------------------------
geometry:
  auto_repair: true
  drop_null_geometries: true
  validity_threshold: 0.95


# ------------------------------------------------------------
# SCHEMA Ś canonical field names and types
# Add/remove fields as your data grows
# ------------------------------------------------------------
schema_config:
  canonical_fields:
    area_name: str
    formation: str
    fault_type: str
    sample_id: str
    cu_pct: float
    depth_m: float
  drop_extra_fields: true
  encoding: utf-8


# ------------------------------------------------------------
# QA
# ------------------------------------------------------------
spatial:
  study_area_path: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/study_area.geojson
  clip_to_study_area: true
  raster_resampling: bilinear
  snap_rasters: true
qa:
  min_row_count: 1
  max_row_count: null
  required_fields: []
  halt_on_failure: true


# ------------------------------------------------------------
# OUTPUT
# ------------------------------------------------------------
output:
  directory: F:/RWTH_Studies/Semester_1_S26/Sustainable_Computational_Engineering_Core/PROJ/DATA/output
  vector_format: gpkg